name: Daily News Update

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC todos los dias
  workflow_dispatch:        # Ejecucion manual desde GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Fetch news
        working-directory: scripts
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node fetch-news.js

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/news.json
          if git diff --cached --quiet; then
            echo "No changes in news.json — skipping commit"
          else
            git commit -m "chore: daily news update [skip ci]"
            git push origin master
          fi
